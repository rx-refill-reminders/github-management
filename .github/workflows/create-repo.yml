name: generate-repo

run-name: "Generate repo: ${{ inputs.NAME }}"

on:

  workflow_dispatch:
    inputs:
      NAME:
        description: 'name:'
        type: string
        required: true
      DESCRIPTION:
        description: 'description:'
        type: string
        required: true

permissions:
  contents: read
  id-token: write

defaults:
  run:
    shell: bash

jobs:

  create-repo:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout github-management
        uses: actions/checkout@v6
      -
        name: Fetch admin app token
        id: fetch-app-token
        uses: rx-refill-reminders/pipeline/.github/actions/github-app-token@github-app-token/v0
        with:
          app-client-id: ${{ secrets.ADMIN_APP_CLIENT_ID }}
          app-private-key: ${{ secrets.ADMIN_APP_PRIVATE_KEY }}
          required: true
      -
        name: Create new repository
        env:
          GH_TOKEN: ${{ steps.fetch-app-token.outputs.token }}
        run: |
          gh repo create \
            "${{ inputs.NAME }}" \
            --description "${{ inputs.DESCRIPTION }}" \
            --public \
            --add-readme
      -
        name: Checkout new repository
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/${{ inputs.NAME }}
          fetch-depth: 0
      -
        name: Setup default repository settings
        env:
          GH_TOKEN: ${{ steps.fetch-app-token.outputs.token }}
        run: |
          echo "Setting up PR settings"
          gh repo edit \
            --delete-branch-on-merge \
            --allow-update-branch \
            --enable-auto-merge \
            --enable-merge-commit=false \
            --enable-rebase-merge=false \
            --enable-squash-merge \
            --squash-merge-commit-message "pr-title-description"
          
          echo "Create PR ruleset"
          cat create-repo/ruleset.yml \
           | gh api repos/${{ github.repository_owner }}/${{ inputs.NAME }}/rulesets \
            -X POST \
            --input -
