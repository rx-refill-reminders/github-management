name: Require PR for main

enforcement: active

# Allow org admins to bypass
bypass_actors:
  - actor_type: OrganizationAdmin
    bypass_mode: always

# Target the default branch
target: branch
conditions:
  ref_name:
    include: ["~DEFAULT_BRANCH"]
    exclude: []

rules:

  # Prevent the branch from being deleted
  - type: deletion

  # Prevent merge commits
  - type: required_linear_history

  # Prevent force pushes
  - type: non_fast_forward

  # PR hygiene
  - type: pull_request
    parameters:
      # Require comments to be resolved
      required_review_thread_resolution: true
      # Dismiss approvals on push
      dismiss_stale_reviews_on_push: true
      required_approving_review_count: 0
      require_code_owner_review: false
      require_last_push_approval: false
      allowed_merge_methods: ["squash"]

  # PR checks
  - type: required_status_checks
    parameters:
      # Require checks to pass on the latest commit
      strict_required_status_checks_policy: true
      required_status_checks: 
        - context: "pr / pr-ready"
          integration_id: 15368
      do_not_enforce_on_create: true
